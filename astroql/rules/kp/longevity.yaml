- rule_id: kp.longevity.direct_csl_signifies_negative.01
  school: kp
  source: KP Reader IV — timing maraka events via cuspal sub-lord
  rule_type: static_placement
  applicable_to:
    relationships:
    - self
    - father
    - mother
    - spouse
    - children
    - elder_sibling
    - younger_sibling
    life_areas:
    - longevity
    effects:
    - event_negative
  antecedent:
  - feature: primary_house_data.direct.csl_signifies_negative_cluster
    op: eq
    value: true
  consequent:
    polarity: negative
    strength: 0.55
    timing_hint: running dasha lord must also signify the cluster
  confidence: 0.55
  tags:
  - csl
  - direct
  - kp
  notes: 'The direct house''s CSL (e.g. 9H for father) signifying the negative

    cluster (badhaka/maraka/8th-from-relationship) flags the core KP

    condition for event timing. Strength of 0.55 reflects that CSL

    signification alone is necessary but not sufficient; dasha confluence

    completes the trigger.

    '
  priority_tier: 1
