# ── Graded yogas (classical-yoga form, weighted-fraction scoring) ─────
# Each yoga collapses what would otherwise be 5-10 fragmented rules into
# one rule whose strength scales with how many factors align. Layered ON
# TOP of the existing rigid rules — legacy rules continue to fire as the
# per-factor baseline; graded yogas add a specificity bonus that rises
# with confluence.
- rule_id: parashari.longevity.classical_maraka_yoga.01
  school: parashari
  source: BPHS Ch. 46 + ml/inspect — multi-factor maraka confluence
  rule_type: dasha_timing
  applicable_to:
    relationships: [self, father, mother, spouse, children, elder_sibling, younger_sibling]
    life_areas: [longevity]
    effects: [event_negative]
  required:
  - feature: candidate.level
    op: in
    value: [AD, PAD]
  factors:
  - {feature: candidate.lord_roles_present,         op: contains,    value: maraka,             weight: 1.0}
  - {feature: candidate.lord_roles_present,         op: contains,    value: eighth_from_target, weight: 0.9}
  - {feature: candidate.lord_roles_present,         op: contains,    value: badhaka_lord,       weight: 0.7}
  - {feature: candidate.lord_roles_present,         op: contains,    value: domain_karaka,      weight: 0.7}
  - {feature: candidate.chain_strength,             op: eq,          value: full,               weight: 0.7}
  - {feature: candidate.n_distinct_roles,           op: gte,         value: 3,                  weight: 0.5}
  - {feature: candidate.saturn_in_chain,            op: eq,          value: true,               weight: 0.5}
  - {feature: candidate.saturn_transit_target,      op: eq,          value: true,               weight: 0.6}
  - {feature: candidate.chain_lord_in_dusthana,     op: eq,          value: true,               weight: 0.4}
  - {feature: candidate.chain_lord_in_8h_from_target, op: eq,        value: true,               weight: 0.5}
  - {feature: candidate.n_debilitated_in_chain,     op: gte,         value: 1,                  weight: 0.4}
  - {feature: candidate.n_combust_in_chain,         op: gte,         value: 1,                  weight: 0.3}
  base_strength: 0.85
  min_factors: 2
  scoring: weighted_fraction
  consequent:
    polarity: negative
  priority_tier: 1
  tags: [graded_yoga, maraka, classical, confluence]
  notes: |
    Graded form of the maraka yoga: any 2+ of 12 weighted factors fire
    the rule, strength = 0.85 * (matched_weight / total_weight). Window
    matching 4-5 factors fires at ~0.4-0.5; window matching 8+ fires near
    0.85. The classical signature (full chain + maraka + 8L + Saturn
    transit) reaches the cap; weak partial matches contribute proportionally.
