- rule_id: parashari.longevity.weak_chain_with_nak_lord_relevant.01
  school: parashari
  source: ml/inspect — Berlinguer + Bardem (chain lords' nakshatra dispositors play roles)
  rule_type: dasha_timing
  applicable_to:
    relationships: [self, father, mother, spouse, children, elder_sibling, younger_sibling]
    life_areas: [longevity]
    effects: [event_negative]
  antecedent:
  - feature: candidate.level
    op: in
    value: [AD, PAD]
  - feature: candidate.chain_strength
    op: eq
    value: weak
  - feature: candidate.any_nak_lord_relevant
    op: eq
    value: true
  consequent:
    polarity: negative
    strength: 0.4
    timing_hint: weak chain — but chain lords' nakshatra dispositors carry the relevant roles (shadow chain)
  confidence: 0.4
  tags: [weak_chain, nakshatra_dispositor, shadow_chain, manual_inspection]
  priority_tier: 2
  notes: |
    Manual finding (Berlinguer, Bardem): chain lords don't carry the
    target roles directly, but their NAKSHATRA dispositors do. Classical
    Vimshottari doctrine: a lord delivers results filtered through its
    nakshatra dispositor. When the dispositor plays the relevant role,
    the period activates that role indirectly. Strength 0.4 (mid-tier)
    so it lifts otherwise-abstained windows but doesn't dominate full
    chains.
