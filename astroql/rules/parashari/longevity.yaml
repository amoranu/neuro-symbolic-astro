- rule_id: parashari.longevity.saturn_transit_target.01
  school: parashari
  source: BPHS — Saturn transit over target (narrowed to confluent windows after Brendan/Chaplin regression)
  rule_type: transit_timing
  applicable_to:
    relationships: [self, father, mother, spouse, children, elder_sibling, younger_sibling]
    life_areas: [longevity]
    effects: [event_negative]
  applicable_when:
  # v38: Laghu Parashari — Saturn transit matters only when Saturn
  # is a functional malefic for this lagna. Skip for Taurus/Libra
  # (Saturn=YK) and Virgo/Capricorn (Saturn is FB via trikona lordship).
  - feature: chart_applicability.saturn_is_fm
    op: eq
    value: true
  antecedent:
  - feature: candidate.level
    op: in
    value: [AD, PAD]
  - feature: candidate.saturn_transit_target
    op: eq
    value: true
  - feature: candidate.n_distinct_roles
    op: gte
    value: 2
  consequent:
    polarity: negative
    strength: 0.6
    timing_hint: Saturn transits over natal 9H/4H AND chain has 2+ confluent roles
  confidence: 0.6
  tags: [transit, saturn, target_sign]
  priority_tier: 1
  notes: |
    Originally fired on any AD/PAD with Saturn over target. v3 inspection
    showed many top-10 charts (Brendan Behan, Michael Chaplin) regressed
    because COMPETITOR windows with sat-transit + 1 weak role got the
    same +0.6 boost as their death window. Narrowing to n_distinct >= 2
    means it only boosts windows already showing role confluence.
- rule_id: parashari.longevity.md_lord_is_8l.01
