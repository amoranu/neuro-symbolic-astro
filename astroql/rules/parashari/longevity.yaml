    value: 1
  consequent:
    polarity: negative
    strength: 0.55
    timing_hint: Saturn transits 9H from natal Moon AND chain has ≥1 malefic
  confidence: 0.55
  tags: [transit, saturn, ninth_from_moon, ashtakavarga]
  priority_tier: 1
  notes: |
    Patel narrows the 9H-from-Lagna/Moon Saturn transit by the
    classical "association/aspect with malefic" gate. We approximate
    "associated with malefic" via "chain has ≥1 malefic" — the active
    dasha lords being malefic-loaded acts as the activation context.

- rule_id: parashari.longevity.saturn_in_father_critical_nakshatra.01
  school: parashari
  source: |
    BPHS via Santhanam — RAG cluster C7 (freq=45):
    "If Saturn passes in transit through Uttarabhadrapada,
    Pushyami or Anuradha nakshatras, the death of father will take
    place if an inauspicious Dasa be in operation. Should the Dasa
    be auspicious or favourable, the father will be in great distress."
  rule_type: transit_timing
  applicable_to:
    relationships: [father]
    life_areas: [longevity]
    effects: [event_negative]
  applicable_when:
  - feature: chart_applicability.saturn_is_fm
    op: eq
    value: true
  antecedent:
  - feature: candidate.level
    op: in
    value: [AD, PAD]
  - feature: candidate.saturn_in_father_critical_nakshatra
    op: eq
    value: true
  - feature: candidate.n_distinct_roles
    op: gte
    value: 2
  consequent:
    polarity: negative
    strength: 0.6
    timing_hint: |
      Saturn transits Pushya/Anuradha/Uttarabhadra AND chain has
      ≥2 confluent roles (proxy for "inauspicious dasha")
  confidence: 0.6
  tags: [transit, saturn, nakshatra, father_specific, bphs]
  priority_tier: 1
  notes: |
    Father-specific by classical doctrine. The "inauspicious dasha"
    requirement from BPHS is approximated by chain has 2+ roles
    activated — chain confluence is our proxy for dasha
    inauspiciousness. Without the role gate the rule fires far
    too often (every chart hits these nakshatras periodically).

- rule_id: parashari.longevity.malefic_saturn_with_maraka_chain.01
  school: parashari
  source: |
    Chatterjee, Advanced Medical Astrology — RAG cluster C15 (freq=9):
    "When a malefic Saturn is associated with any of the planets
    causing death he over sides all others and himself causes death."
  rule_type: dasha_timing
  applicable_to:
