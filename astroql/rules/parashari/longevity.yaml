    op: eq
    value: true
  - feature: candidate.chain_strength
    op: eq
    value: full
  consequent:
    polarity: negative
    strength: 0.6
    timing_hint: Saturn in FULL chain co-active with chain-maraka role lord
  confidence: 0.6
  tags: [dasha_chain, saturn, maraka, classical_death]
  priority_tier: 1
  notes: |
    Chatterjee's doctrine: when Saturn co-runs with a death-cluster
    role lord (8L / maraka / badhaka), Saturn dominates the
    period and himself becomes the death agent.

    v33d: tightened to chain_strength=full (3/3 lords matched) to
    cut noise. v33b/c showed the original gate (Saturn-in-chain +
    any chain death role) fired in 80%+ of top-20 windows because
    Saturn-in-vimshottari-period × death-cluster-role-overlap is
    a common conjunction. Restricting to FULL chains shrinks the
    fire-rate sharply while keeping the doctrine's cleanest
    instances.

