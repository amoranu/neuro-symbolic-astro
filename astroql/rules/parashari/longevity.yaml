- rule_id: parashari.longevity.afflicted_target_lord_pratyantar.01
  school: parashari
  source: |
    BPHS Ch.46 v.19; Phaladeepika Ch.18 v.13-15; Saravali 31.32.
    "When the dispositor... is afflicted in a Dusthana and runs his
    Antardasha or Pratyantar, the native suffers severe events related
    to that lord's house" — BPHS 46.19. Cross-confirmed via inspection
    of Anais Nin (Jupiter as rotated_lord, in 6H, combust, PAD=Jupiter)
    and Hedy Lamarr (Jupiter as direct_lord, in 8H, debilitated AND
    combust, PAD=Jupiter).
  rule_type: dasha_timing
  applicable_to:
    relationships: [self, father, mother, spouse, children, elder_sibling, younger_sibling]
    life_areas: [longevity]
    effects: [event_negative]
  required:
  - feature: candidate.level
    op: in
    value: [AD, PAD]
  - feature: candidate.lord_roles_present
    op: contains_any
    value: [rotated_lord, direct_lord]
  factors:
  # Static-natal affliction conditions on the target's house lord(s).
  # Each weight reflects classical emphasis: Phaladeepika gives equal
  # weight to dignity affliction and dusthana placement; combustion is
  # cited as the most severe modifier (Saravali 31.32).
  - {feature: primary_house_data.rotated.lord_house,    op: in,       value: [6, 8, 12], weight: 0.8}
  - {feature: primary_house_data.rotated.lord_dignity,  op: in,       value: [debilitated, enemy], weight: 0.7}
  - {feature: primary_house_data.rotated.lord_combust,  op: eq,       value: true,       weight: 0.6}
  - {feature: primary_house_data.direct.lord_house,     op: in,       value: [6, 8, 12], weight: 0.7}
  - {feature: primary_house_data.direct.lord_dignity,   op: in,       value: [debilitated, enemy], weight: 0.6}
  - {feature: primary_house_data.direct.lord_combust,   op: eq,       value: true,       weight: 0.5}
  # Per-candidate amplifiers — when the chain is otherwise weak this
  # yoga is the only signal pointing at the death window. When the
  # chain is strong, the affliction reinforces the existing maraka
  # confluence.
  - {feature: candidate.chain_strength,                 op: eq,       value: weak,       weight: 0.4}
  - {feature: candidate.n_combust_in_chain,             op: gte,      value: 1,          weight: 0.4}
  - {feature: candidate.chain_lord_in_dusthana,         op: eq,       value: true,       weight: 0.5}
  base_strength: 0.85
  min_factors: 2
  consequent:
    polarity: negative
  priority_tier: 1
  tags: [graded_yoga, afflicted_target_lord, classical_text, abstain_rescue]
  notes: |
    Mixes static (chart-level) affliction conditions with per-window
    activation. The required gate ensures it only fires when the
    candidate's chain TOUCHES the target lord (rotated or direct);
    factors then grade the strength based on how many afflictions
    apply to the target's house lords. A chart where the rotated lord
    is debilitated AND in 6H AND combust, AND the candidate window
    activates that lord, lands near base_strength = 0.85.
