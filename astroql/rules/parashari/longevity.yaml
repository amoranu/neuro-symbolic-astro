- rule_id: parashari.longevity.malefics_4h_from_sun.01
  school: parashari
  source: |
    Patel, Ashtakavarga (1996), Sloka 10 — RAG cluster C8 (freq=45):
    "A person born having Rahu, Saturn or Mars in the 4th house from
    the Sun, will be the cause of his father's early death provided
    that house (4th house from the Sun) is not aspected either by
    Jupiter or Venus."
  rule_type: static_placement
  applicable_to:
    relationships: [father]
    life_areas: [longevity]
    effects: [event_negative]
  antecedent:
  - feature: primary_house_data.malefics_4h_from_sun_unprotected
    op: eq
    value: true
  consequent:
    polarity: negative
    strength: 0.6
    timing_hint: chart-static — applies uniformly across windows
  confidence: 0.6
  tags: [chart_static, malefics, sun_pitri, ashtakavarga]
  priority_tier: 2
  notes: |
    Father-specific by classical doctrine (rule names "father's early
    death"). The "unprotected" gate AND-s the Jupiter/Venus aspect
    exception in the rule body so we don't need a separate attack
    yoga. Static line — fires once per chart, contributes a constant
    offset to all windows in that chart's static_promise score.

