- rule_id: parashari.longevity.jupiter_transit_target_protective.01
  school: parashari
  source: BPHS — Jupiter transit protects target house (narrowed to non-full chains)
  rule_type: transit_timing
  applicable_to:
    relationships: [self, father, mother, spouse, children, elder_sibling, younger_sibling]
    life_areas: [longevity]
    effects: [event_negative]
  # v38.6b: REVERTED applicable_when jupiter_is_fb — gating attack/
  # protective rules removes noise-dampening on non-applicable charts,
  # letting imposters outrank death windows. Protective effect of
  # Jupiter transit stands across all lagnas (even when Jupiter is
  # also FM via 3L/6L — he's still transit-auspicious).
  antecedent:
  - feature: candidate.level
    op: in
    value: [AD, PAD]
  - feature: candidate.jupiter_transit_target
    op: eq
    value: true
  - feature: candidate.chain_strength
    op: neq
    value: full
  consequent:
    polarity: positive
    strength: 0.4
    timing_hint: Jupiter transit blesses non-full chains; full chain affliction overrides Jupiter mercy
  confidence: 0.4
  tags: [transit, jupiter, protective]
  priority_tier: 2
  notes: |
    v6 inspection (Brendan Behan): the protective rule was firing on his
    death window (jup_tr=True) and subtracting score, even though his
    chain was full-malefic with 5 distinct roles. Narrowed to chain_
    strength != full so a saturated malefic chain isn't overridden by
    transit-Jupiter mercy.
